name: Build touchHLE

on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]
  create: # for tags

env:
  CARGO_TERM_COLOR: always

jobs:
  build-osx:
    runs-on: macos-latest  

    steps:  
      - name: Checkout touchHLE  
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE"  
          git clone https://github.com/j92580498-max/touchHLE "$GITHUB_WORKSPACE"  
          cd "$GITHUB_WORKSPACE"  
          git fetch origin "$GITHUB_REF"  
          git checkout "$GITHUB_SHA"
      - name: Get Submodules  
        run: git submodule update --init  
      - name: Cache Rust build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install Boost  
        run: brew install boost  
      - name: Try to get cached copy of cmake  
        id: cache-cmake  
        uses: actions/cache@v3  
        with:  
          path: vendor/cmake  
          key: cmake_3_31_6_macos  
      - if: ${{ steps.cache-cmake.outputs.cache-hit != 'true' }}  
        name: Download Cmake  
        run: curl -L -O "https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-macos-universal.tar.gz"  
      - if: ${{ steps.cache-cmake.outputs.cache-hit != 'true' }}  
        name: Extract Cmake  
        run: tar xzvf "cmake-3.31.6-macos-universal.tar.gz" -C vendor && mv "vendor/cmake-3.31.6-macos-universal/CMake.app/Contents/" vendor/cmake && rm -rf vendor/cmake-3.31.6-macos-universal  
      - name: Install x86_64 toolchain  
        run: rustup target add x86_64-apple-darwin  
      - name: Build  
        run: cargo build --target x86_64-apple-darwin --release  
        env:  
          CMAKE: ${{ github.workspace }}/vendor/cmake/bin/cmake  
      - name: Create .app bundle and DMG
        # `hdiutil create` periodically fails on the `macos-15-arm64` GitHub
        # Actions runners with `hdiutil: create failed - Resource busy` when
        # Spotlight (`mds`/`mds_stores`) decides to index `touchHLE-dmg-src`
        # at the same moment hdiutil tries to snapshot it, or when a stale
        # `/Volumes/touchHLE` from a previous run hasn't fully detached.
        # Mirror the workaround Apple documents in TN2065 / `hdiutil(1)` —
        # detach any stray attachment, pass `-ov` so an existing image is
        # overwritten cleanly, and retry a few times. See
        # <https://developer.apple.com/library/archive/technotes/tn2065/_index.html>.
        run: |
          set -eu
          cd dev-scripts
          ./make-macos-bundle.sh \
            ../target/x86_64-apple-darwin/release/touchHLE \
            "`cargo run --package touchHLE_version`" \
            "`cargo run --package touchHLE_version -- --branding`"
          mkdir touchHLE-dmg-src
          mv *.app touchHLE-dmg-src/
          # Forbid Spotlight from indexing the staging folder so it can't
          # race with hdiutil for an exclusive handle.
          touch touchHLE-dmg-src/.metadata_never_index || true
          # Tear down any stale mount left over from a previous run.
          if [ -d "/Volumes/touchHLE" ]; then
            hdiutil detach -force "/Volumes/touchHLE" || true
          fi
          # Retry hdiutil up to 5 times with growing back-off.
          attempt=1
          max_attempts=5
          until hdiutil create -ov -volname touchHLE \
              -srcfolder touchHLE-dmg-src touchHLE.dmg; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "hdiutil create still failed after $max_attempts attempts" >&2
              exit 1
            fi
            sleep_secs=$((attempt * 5))
            echo "hdiutil create failed (attempt $attempt); retrying in ${sleep_secs}s" >&2
            if [ -d "/Volumes/touchHLE" ]; then
              hdiutil detach -force "/Volumes/touchHLE" || true
            fi
            sleep "$sleep_secs"
            attempt=$((attempt + 1))
          done
          mv touchHLE.dmg ..
      - uses: actions/upload-artifact@v4  
        with:  
          name: touchHLE_macOS_x86_64  
          path: touchHLE.dmg  
